server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA: serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Django runs with host networking, so reach it through the host gateway.
    location /api/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket connections to Django Channels (Daphne)
    location /ws/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;   # keep alive for long-running scans
    }
}
